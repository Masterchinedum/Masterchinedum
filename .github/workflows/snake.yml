name: Generate Profile Assets

on:
  schedule:
    - cron: "0 6 * * *" # runs daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-3d-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Masterchinedum
          MAX_REPOS: 10

      - name: Commit and push 3D profile
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git diff --cached --quiet || git commit -m "chore: regenerate 3D contribution calendar [skip ci]"
          git push

  generate-stats-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: generate-3d-calendar
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Masterchinedum
          BRANCH_NAME: main
