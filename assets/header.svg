<svg viewBox="0 0 1000 260" width="1000" height="260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chinedu Kingsley Okereke — Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0d"/>
      <stop offset="0.55" stop-color="#0d0e11"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.28" cy="0.4" r="0.9">
      <stop offset="0" stop-color="#15171b"/>
      <stop offset="1" stop-color="#070809"/>
    </radialGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0f3f6"/>
      <stop offset="1" stop-color="#3a3f46"/>
    </linearGradient>
    <style>
      @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes draw   { to { stroke-dashoffset: 0; } }
      @keyframes blink  { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

      .fade   { opacity: 0; animation: fadeUp 0.9s cubic-bezier(.2,.8,.2,1) forwards; }
      .d1     { animation-delay: 0.10s; }
      .d2     { animation-delay: 0.32s; }
      .d3     { animation-delay: 0.78s; }
      .accent { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s 0.55s cubic-bezier(.2,.8,.2,1) forwards; }
      .cursor { animation: blink 1.15s steps(1) infinite; }

      .eyebrow { font-family: 'JetBrains Mono','SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace; font-size: 13px; letter-spacing: 4.5px; fill: #8b949e; }
      .name    { font-family: 'Segoe UI',Helvetica,Arial,system-ui,sans-serif; font-weight: 700; font-size: 46px; fill: #f0f3f6; letter-spacing: 0.5px; }
      .tagline { font-family: 'JetBrains Mono','SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace; font-size: 15px; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1000" height="260" fill="url(#bg)"/>
  <rect width="1000" height="260" fill="url(#vignette)" opacity="0.5"/>

  <!-- faint inset frame -->
  <rect x="16" y="16" width="968" height="228" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
  <!-- corner ticks -->
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.4">
    <path d="M16 40 L16 24 L32 24"/>
    <path d="M984 220 L984 236 L968 236"/>
  </g>

  <!-- content -->
  <g transform="translate(70, 0)">
    <text class="eyebrow fade d1" x="2" y="92">SOFTWARE&#160;ENGINEER&#160;&#160;&#183;&#160;&#160;AI&#160;SYSTEMS&#160;&#160;&#183;&#160;&#160;INFRASTRUCTURE</text>

    <text class="name fade d2" x="0" y="142">Chinedu Kingsley Okereke</text>

    <line class="accent" x1="2" y1="166" x2="302" y2="166" stroke="url(#hairline)" stroke-width="2" stroke-linecap="round"/>

    <text class="tagline fade d3" x="2" y="202">
      <tspan fill="#6e7681">$ </tspan><tspan fill="#b1bac4">building systems that scale at production grade</tspan><tspan class="cursor" fill="#f0f3f6" dx="3">&#9611;</tspan>
    </text>
  </g>
</svg>
