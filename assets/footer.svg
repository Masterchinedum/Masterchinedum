<svg viewBox="0 0 1000 130" width="1000" height="130" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Build systems. Engineer intelligently. Ship relentlessly.">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070809"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b0c0e"/>
      <stop offset="0.5" stop-color="#3a3f46"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes blink  { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
      .fin    { opacity: 0; animation: fadeIn 1s 0.3s ease-out forwards; }
      .cur    { animation: blink 1.15s steps(1) infinite; }
      .quote  { font-family: 'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace; font-size: 15px; letter-spacing: 1px; fill: #8b949e; }
      .dot    { fill: #6e7681; }
    </style>
  </defs>

  <rect width="1000" height="130" fill="url(#fbg)"/>
  <line x1="200" y1="34" x2="800" y2="34" stroke="url(#fline)" stroke-width="1"/>

  <g class="fin" text-anchor="middle">
    <text class="quote" x="500" y="78">build systems&#160;&#160;&#183;&#160;&#160;engineer intelligently&#160;&#160;&#183;&#160;&#160;ship relentlessly<tspan class="cur" fill="#c9d1d9" dx="4">&#9611;</tspan></text>
  </g>

  <g class="fin">
    <circle class="dot" cx="492" cy="104" r="1.6"/>
    <circle class="dot" cx="500" cy="104" r="1.6"/>
    <circle class="dot" cx="508" cy="104" r="1.6"/>
  </g>
</svg>
